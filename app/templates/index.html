<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Java Compiler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M10 13l-2 2 2 2"></path><path d="M14 17l2-2-2-2"></path></svg>
                <h1>Mini-Java Compiler</h1>
            </div>
            <div class="header-controls">
                <div class="select-wrapper">
                    <select id="mode">
                        <option value="all">All Passes</option>
                        <option value="lexer">Lexer Only</option>
                        <option value="recursive">Recursive Descent</option>
                        <option value="predictive">Predictive (LL(1))</option>
                        <option value="lr">LR Parser</option>
                    </select>
                </div>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="dumpSymbols">
                    <span class="checkmark"></span>
                    Dump Symbols
                </label>
                <button id="compileBtn" class="primary-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Compile
                </button>
            </div>
        </header>

        <main class="main-content">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Test Cases</h2>
                </div>
                <ul id="testList" class="test-list">
                    <!-- Tests populated here via JS -->
                    <li class="loading-item">Loading tests...</li>
                </ul>
            </aside>

            <div class="editor-pane">
                <div class="pane-header">
                    <h2>Source Code</h2>
                    <span class="file-name" id="currentFileName">untitled.mj</span>
                </div>
                <div class="editor-container">
                    <textarea id="sourceCode" spellcheck="false" placeholder="Write your Mini-Java code here...">class Main {
    public static void main(String[] args) {
        System.out.println(42);
    }
}</textarea>
                </div>
            </div>

            <div class="output-pane">
                <div class="pane-header">
                    <h2>Console Output</h2>
                    <button id="clearBtn" class="icon-btn" title="Clear Console">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
                <div class="console-container">
                    <pre id="outputConsole">Ready.</pre>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
