<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler UI</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; background-color: #f4f4f4; }
        .container { display: flex; flex: 1; gap: 20px; }
        .editor-section, .output-section { flex: 1; display: flex; flex-direction: column; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        textarea { flex: 1; font-family: monospace; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; resize: none; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        pre.output { flex: 1; background: #222; color: #0f0; padding: 10px; border-radius: 4px; overflow-y: auto; white-space: pre-wrap; margin: 0; font-family: monospace; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>Mini-Java Compiler Online</h1>
    <div class="container">
        <div class="editor-section">
            <h2>Source Code</h2>
            <div class="controls">
                <label for="mode">Mode:</label>
                <select id="mode">
                    <option value="all">All</option>
                    <option value="lexer">Lexer</option>
                    <option value="recursive">Recursive Descent</option>
                    <option value="predictive">Predictive (LL(1))</option>
                    <option value="lr">LR Parser</option>
                </select>
                
                <label>
                    <input type="checkbox" id="dumpSymbols"> Dump Symbols
                </label>
                
                <button id="compileBtn">Compile</button>
            </div>
            <textarea id="sourceCode" placeholder="Enter your Mini-Java code here...">
// Enter your code
class Main {
    public static void main(String[] args) {
        System.out.println(42);
    }
}
</textarea>
        </div>
        
        <div class="output-section">
            <h2>Output</h2>
            <pre class="output" id="outputConsole">Output will appear here...</pre>
        </div>
    </div>

    <script>
        document.getElementById('compileBtn').addEventListener('click', async () => {
            const btn = document.getElementById('compileBtn');
            const code = document.getElementById('sourceCode').value;
            const mode = document.getElementById('mode').value;
            const dumpSymbols = document.getElementById('dumpSymbols').checked;
            const outputConsole = document.getElementById('outputConsole');

            btn.disabled = true;
            btn.innerText = 'Compiling...';
            outputConsole.innerText = 'Compiling...';
            outputConsole.classList.remove('error');

            try {
                const response = await fetch('/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, mode, dumpSymbols })
                });

                const result = await response.json();
                
                if (result.error) {
                    outputConsole.classList.add('error');
                }
                outputConsole.innerText = result.output || "No output returned.";
            } catch (err) {
                outputConsole.classList.add('error');
                outputConsole.innerText = `Error: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Compile';
            }
        });
    </script>
</body>
</html>
